<svg width="580" height="500" viewBox="0 0 580 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <filter id="center-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="28" flood-color="rgba(200,55,45,0.35)"/>
    </filter>
    <linearGradient id="center-grad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d94035"/>
      <stop offset="1" stop-color="#c8372d"/>
    </linearGradient>
    <linearGradient id="insta-bg" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#f09433"/>
      <stop offset="0.25" stop-color="#e6683c"/>
      <stop offset="0.5"  stop-color="#dc2743"/>
      <stop offset="0.75" stop-color="#cc2366"/>
      <stop offset="1"    stop-color="#bc1888"/>
    </linearGradient>
    <linearGradient id="top-bar-insta" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#833ab4"/>
      <stop offset="0.5" stop-color="#fd1d1d"/>
      <stop offset="1"   stop-color="#fcb045"/>
    </linearGradient>
  </defs>

  <!-- ── Orbit ring ── -->
  <circle cx="290" cy="250" r="162" fill="none" stroke="#f0dedd" stroke-width="1.5" stroke-dasharray="5 8"/>

  <!-- ── Connecting lines ── -->
  <line x1="290" y1="208" x2="290" y2="128" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="324" y1="222" x2="398" y2="168" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="324" y1="278" x2="398" y2="332" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="290" y1="292" x2="290" y2="372" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="256" y1="278" x2="182" y2="332" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="256" y1="222" x2="182" y2="168" stroke="#e8c8c6" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- Midpoint dots -->
  <circle cx="290" cy="168" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>
  <circle cx="362" cy="195" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>
  <circle cx="362" cy="305" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>
  <circle cx="290" cy="332" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>
  <circle cx="218" cy="305" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>
  <circle cx="218" cy="195" r="4.5" fill="white" stroke="#c8372d" stroke-width="1.5"/>

  <!-- ════════════ INSTAGRAM — top ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="200" y="44" width="180" height="80" rx="18" fill="white"/>
    <!-- top colour bar -->
    <rect x="200" y="44" width="180" height="5" rx="2.5" fill="url(#top-bar-insta)"/>
    <!-- icon -->
    <rect x="218" y="60" width="36" height="36" rx="10" fill="url(#insta-bg)"/>
    <rect x="224" y="66" width="24" height="24" rx="6" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="236" cy="78" r="6.5" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="244.5" cy="69.5" r="2" fill="white"/>
    <!-- text -->
    <text x="262" y="74" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">Instagram</text>
    <text x="262" y="90" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">Reels · Stories</text>
    <!-- tag -->
    <rect x="218" y="102" width="108" height="14" rx="7" fill="#fdf2f8"/>
    <text x="229" y="113" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="600" fill="#cc2366">4+ posts / week</text>
  </g>

  <!-- ════════════ GMB — top-left ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="54" y="120" width="180" height="90" rx="18" fill="white"/>
    <rect x="54" y="120" width="180" height="5" rx="2.5" fill="#4285f4"/>
    <!-- Google G -->
    <circle cx="88" cy="155" r="20" fill="#f8f9fa"/>
    <!-- G shape using paths -->
    <path d="M97 155h-9v-5h14.5A14 14 0 1 1 88 141a14 14 0 0 1 9.7 3.9l-3.5 3.5A8.8 8.8 0 1 0 96.8 155z" fill="#4285f4"/>
    <path d="M88 151v8h9v-8z" fill="#34a853"/>
    <path d="M79.3 147.3l-3.8-3.8A14 14 0 0 0 74 155a14 14 0 0 0 1.5 6.5l3.8-3.8A8.8 8.8 0 0 1 88 146.2v-8.4A14 14 0 0 0 79.3 147.3z" fill="#fbbc05"/>
    <path d="M88 169a14 14 0 0 1-12.7-8.5l3.8-3.8A8.8 8.8 0 0 0 88 163.8v5.2z" fill="#ea4335"/>
    <!-- text -->
    <text x="116" y="148" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">GMB Profile</text>
    <text x="116" y="164" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">Maps · Search</text>
    <!-- stars -->
    <text x="62" y="200" font-family="Inter,Arial,sans-serif" font-size="13" fill="#f59e0b">★★★★</text>
    <text x="118" y="200" font-family="Inter,Arial,sans-serif" font-size="11" fill="#f59e0b">½</text>
    <text x="132" y="200" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6b7280"> 4.9 · 300+ reviews</text>
  </g>

  <!-- ════════════ YOUTUBE — top-right ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="346" y="120" width="180" height="90" rx="18" fill="white"/>
    <rect x="346" y="120" width="180" height="5" rx="2.5" fill="#ff0000"/>
    <!-- YT icon -->
    <rect x="364" y="139" width="42" height="30" rx="8" fill="#ff0000"/>
    <polygon points="376,149 376,160 388,154.5" fill="white"/>
    <!-- text -->
    <text x="414" y="152" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">YouTube</text>
    <text x="414" y="168" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">Video Marketing</text>
    <!-- tag -->
    <rect x="364" y="192" width="106" height="14" rx="7" fill="#fff5f5"/>
    <text x="371" y="203" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="600" fill="#c8372d">#  Short Videos</text>
  </g>

  <!-- ════════════ SEARCH ADS — bottom-right ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="346" y="302" width="180" height="90" rx="18" fill="white"/>
    <rect x="346" y="302" width="180" height="5" rx="2.5" fill="#34a853"/>
    <!-- Search icon -->
    <circle cx="385" cy="334" r="15" fill="none" stroke="#4285f4" stroke-width="3"/>
    <line x1="396" y1="345" x2="406" y2="355" stroke="#4285f4" stroke-width="3" stroke-linecap="round"/>
    <!-- Ad badge -->
    <rect x="370" y="353" width="28" height="16" rx="4" fill="#34a853"/>
    <text x="373" y="364.5" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" fill="white">Ad</text>
    <!-- text -->
    <text x="414" y="328" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">Search Ads</text>
    <text x="414" y="344" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">Google PPC</text>
    <text x="414" y="368" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#34a853">Top results</text>
  </g>

  <!-- ════════════ META ADS — bottom ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="200" y="388" width="180" height="80" rx="18" fill="white"/>
    <rect x="200" y="388" width="180" height="5" rx="2.5" fill="#0668e1"/>
    <!-- Facebook icon -->
    <rect x="218" y="404" width="36" height="36" rx="10" fill="#0668e1"/>
    <text x="226" y="428" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="white">f</text>
    <!-- text -->
    <text x="262" y="418" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">Meta Ads</text>
    <text x="262" y="434" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">FB · Instagram</text>
    <!-- tag -->
    <rect x="218" y="444" width="104" height="14" rx="7" fill="#fff5f5"/>
    <text x="226" y="455" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="600" fill="#c8372d">Hyper-targeted</text>
  </g>

  <!-- ════════════ WEBSITE — bottom-left ════════════ -->
  <g filter="url(#card-shadow)">
    <rect x="54" y="302" width="180" height="90" rx="18" fill="white"/>
    <rect x="54" y="302" width="180" height="5" rx="2.5" fill="#10b981"/>
    <!-- Globe icon -->
    <circle cx="88" cy="334" r="17" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <ellipse cx="88" cy="334" rx="7" ry="17" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="71" y1="334" x2="105" y2="334" stroke="#10b981" stroke-width="2"/>
    <line x1="74" y1="323" x2="102" y2="323" stroke="#10b981" stroke-width="1.5"/>
    <line x1="74" y1="345" x2="102" y2="345" stroke="#10b981" stroke-width="1.5"/>
    <!-- text -->
    <text x="116" y="326" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#111">Website</text>
    <text x="116" y="342" font-family="Inter,Arial,sans-serif" font-size="11" fill="#9ca3af">Free for 1 Year</text>
    <!-- tag -->
    <text x="62" y="382" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#10b981">SEO optimised</text>
  </g>

  <!-- ════════════ CENTRE HUB ════════════ -->
  <g filter="url(#center-shadow)">
    <!-- Pill shape -->
    <rect x="188" y="200" width="204" height="104" rx="40" fill="url(#center-grad)"/>
    <!-- Inner highlight -->
    <rect x="192" y="204" width="196" height="52" rx="36" fill="rgba(255,255,255,0.10)"/>

    <!-- Mask/shield icon -->
    <path d="M220 228 Q228 222 236 228 Q236 238 228 242 Q220 238 220 228Z" fill="rgba(255,255,255,0.55)"/>

    <!-- #1 badge -->
    <rect x="240" y="208" width="38" height="22" rx="11" fill="white"/>
    <text x="249" y="223.5" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="900" fill="#c8372d">#1</text>

    <!-- Labels -->
    <text x="290" y="258" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">Your Practice</text>
    <text x="290" y="275" font-family="Inter,Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.78)" text-anchor="middle">360° Digital Presence</text>

    <!-- Bottom strip -->
    <rect x="210" y="281" width="160" height="30" rx="15" fill="rgba(0,0,0,0.15)"/>
    <text x="290" y="300" font-family="Inter,Arial,sans-serif" font-size="10.5" font-weight="700" fill="white" text-anchor="middle">Dominate Your City  →</text>
  </g>
</svg>
