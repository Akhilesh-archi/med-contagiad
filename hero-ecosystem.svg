<svg width="580" height="510" viewBox="0 0 580 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="icon-sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="rgba(0,0,0,0.11)"/>
    </filter>
    <filter id="hub-sh" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="28" flood-color="rgba(200,55,45,0.42)"/>
    </filter>

    <linearGradient id="hub-g" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d94035"/>
      <stop offset="1" stop-color="#c8372d"/>
    </linearGradient>
    <linearGradient id="insta-g" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#f09433"/>
      <stop offset="0.4" stop-color="#dc2743"/>
      <stop offset="1" stop-color="#bc1888"/>
    </linearGradient>

    <radialGradient id="hub-ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,55,45,0.12)"/>
      <stop offset="100%" stop-color="rgba(200,55,45,0)"/>
    </radialGradient>

    <clipPath id="hub-clip">
      <circle cx="290" cy="250" r="90"/>
    </clipPath>

    <!-- Arrowhead marker -->
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 6,2.5 0,5" fill="#fca5a5"/>
    </marker>
  </defs>

  <!-- Ambient glow behind hub -->
  <circle cx="290" cy="250" r="130" fill="url(#hub-ambient)"/>

  <!-- ─── 360° ARC ARROW (starts & ends at Instagram) ─── -->
  <path d="M319,57 A195,195 0 1,1 261,57" fill="none" stroke="#fca5a5" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- ─── CONNECTOR LINES (hub → icons) ─── -->
  <line x1="290" y1="160" x2="290" y2="83"  stroke="#f3c0bc" stroke-width="1"/>
  <line x1="368" y1="205" x2="433" y2="158" stroke="#f3c0bc" stroke-width="1"/>
  <line x1="368" y1="295" x2="433" y2="342" stroke="#f3c0bc" stroke-width="1"/>
  <line x1="290" y1="340" x2="290" y2="417" stroke="#f3c0bc" stroke-width="1"/>
  <line x1="212" y1="295" x2="147" y2="342" stroke="#f3c0bc" stroke-width="1"/>
  <line x1="212" y1="205" x2="147" y2="158" stroke="#f3c0bc" stroke-width="1"/>

  <!-- Midpoint dots -->
  <circle cx="290" cy="122" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>
  <circle cx="400" cy="182" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>
  <circle cx="400" cy="318" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>
  <circle cx="290" cy="378" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>
  <circle cx="180" cy="318" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>
  <circle cx="180" cy="182" r="4" fill="white" stroke="#e8b0ac" stroke-width="1.5"/>

  <!-- ─── SERVICE ICONS ─── -->

  <!-- INSTAGRAM — top (290, 55) -->
  <g filter="url(#icon-sh)">
    <circle cx="290" cy="55" r="28" fill="white"/>
    <rect x="275" y="40" width="30" height="30" rx="9" fill="url(#insta-g)"/>
    <rect x="281" y="46" width="18" height="18" rx="5" fill="none" stroke="white" stroke-width="1.8"/>
    <circle cx="290" cy="55" r="5" fill="none" stroke="white" stroke-width="1.8"/>
    <circle cx="298.5" cy="47.5" r="1.8" fill="white"/>
  </g>
  <text x="290" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">Instagram</text>

  <!-- Google Maps — top-right (459, 153) -->
  <g filter="url(#icon-sh)">
    <circle cx="459" cy="153" r="28" fill="white"/>
    <path d="M459 138 C453 138 448 143 448 149 C448 157 459 168 459 168 C459 168 470 157 470 149 C470 143 465 138 459 138Z" fill="#ea4335"/>
    <circle cx="459" cy="149" r="4.5" fill="white"/>
  </g>
  <text x="459" y="192" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">Google Maps</text>

  <!-- YOUTUBE — bottom-right (459, 347) -->
  <g filter="url(#icon-sh)">
    <circle cx="459" cy="347" r="28" fill="white"/>
    <rect x="444" y="332" width="30" height="30" rx="8" fill="#ff0000"/>
    <polygon points="456,341 456,357 468,349" fill="white"/>
  </g>
  <text x="459" y="386" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">YouTube</text>

  <!-- META ADS — bottom (290, 445) -->
  <g filter="url(#icon-sh)">
    <circle cx="290" cy="445" r="28" fill="white"/>
    <rect x="275" y="430" width="30" height="30" rx="8" fill="#0668e1"/>
    <text x="290" y="452" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="900" fill="white">f</text>
  </g>
  <text x="290" y="484" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">Meta Ads</text>

  <!-- WEBSITE — bottom-left (121, 347) -->
  <g filter="url(#icon-sh)">
    <circle cx="121" cy="347" r="28" fill="white"/>
    <circle cx="121" cy="347" r="16" fill="none" stroke="#10b981" stroke-width="2.2"/>
    <ellipse cx="121" cy="347" rx="6.5" ry="16" fill="none" stroke="#10b981" stroke-width="1.6"/>
    <line x1="105" y1="347" x2="137" y2="347" stroke="#10b981" stroke-width="1.5"/>
    <line x1="108" y1="337" x2="134" y2="337" stroke="#10b981" stroke-width="1.2"/>
    <line x1="108" y1="357" x2="134" y2="357" stroke="#10b981" stroke-width="1.2"/>
  </g>
  <text x="121" y="386" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">Website</text>

  <!-- SEARCH ADS — top-left (121, 153) -->
  <g filter="url(#icon-sh)">
    <circle cx="121" cy="153" r="28" fill="white"/>
    <circle cx="116" cy="148" r="10" fill="none" stroke="#34a853" stroke-width="2.4"/>
    <line x1="123" y1="155" x2="132" y2="164" stroke="#34a853" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="107" y="160" width="22" height="13" rx="3.5" fill="#34a853"/>
    <text x="118" y="170" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="7.5" font-weight="800" fill="white">Ad</text>
  </g>
  <text x="121" y="192" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#0f0f0f">Search Ads</text>

  <!-- ─── FLOATING STAT PILL ─── -->
  <g filter="url(#icon-sh)">
    <rect x="18" y="454" width="178" height="46" rx="23" fill="white"/>
    <circle cx="42" cy="477" r="17" fill="#fde8e7"/>
    <circle cx="39" cy="472" r="4.5" fill="#c8372d"/>
    <circle cx="47" cy="472" r="4.5" fill="#c8372d"/>
    <path d="M32 481 Q32 476 39 476 Q47 476 54 476 Q59 476 59 481" stroke="#c8372d" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="70" y="472" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="#0f0f0f">75+</text>
    <text x="70" y="488" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="600" fill="#0f0f0f">Practices grown</text>
  </g>

  <!-- ─── CENTER HUB ─── -->
  <g filter="url(#hub-sh)">
    <circle cx="290" cy="250" r="90" fill="url(#hub-g)"/>
    <!-- Clipped content: 360 watermark + top highlight -->
    <g clip-path="url(#hub-clip)">
      <text x="290" y="290" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="88" font-weight="900" fill="rgba(255,255,255,0.09)" letter-spacing="-4">360</text>
      <path d="M200,250 A90,90 0 0,1 380,250 Z" fill="rgba(255,255,255,0.07)"/>
    </g>
    <!-- #1 badge -->
    <rect x="271" y="196" width="38" height="22" rx="11" fill="white"/>
    <text x="290" y="211" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="900" fill="#c8372d">#1</text>
    <!-- Text content -->
    <text x="290" y="258" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="white">Your Practice</text>
    <text x="290" y="275" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.82)">360° Digital Presence</text>
    <text x="290" y="294" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="white">Dominate Your City</text>
  </g>
</svg>
